version: '3.8'

services:
  calculateur-3d:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "3080:3080"

    restart: unless-stopped

    env_file:
      - .env

    environment:
      - NODE_ENV=production
      - TZ=Europe/Paris
      - PORT=3080
      - SAAS_URL=https://saas.ced-it.be
      - APP_URL=https://calculateur-impression-3d.ced-it.be

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    networks:
      - calculateur-network

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "traefik.enable=false"
      - "com.example.description=Calculateur de prix d'impression 3D"
      - "com.example.department=Production"
      - "com.example.version=4.0.0"

networks:
  calculateur-network:
    driver: bridge
